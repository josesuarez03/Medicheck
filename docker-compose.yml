  #     - app

  # certbot:
  #   image: certbot/certbot
  #   container_name: certbot
  #   restart: unless-stopped
  #   volumes:
  #     - ./nginx/certbot/www:/var/www/certbot:rw
  #     - ./nginx/certbot/conf:/etc/letsencrypt:rw
  #   networks:
  #     - app

  gateway:
    build:
      context: ./backend
      dockerfile: gateway/Dockerfile
    container_name: gateway
    env_file:
      - .env
    restart: on-failure
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      django-api-principal:
        condition: service_healthy
      ai-service:
        condition: service_started
      expert-service:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    ports:
      - "5000:5000"
    command: uvicorn main:app --host 0.0.0.0 --port 5000 --workers 2
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB_CONTEXT: ${REDIS_DB_CONTEXT:-2}
      REDIS_DB_EPHEMERAL: ${REDIS_DB_EPHEMERAL:-6}
      REDIS_DB_CELERY_RESULTS: ${REDIS_DB_CELERY_RESULTS:-4}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672//}
      AI_SERVICE_URL: ${AI_SERVICE_URL}
      EXPERT_SERVICE_URL: ${EXPERT_SERVICE_URL}
    networks:
      - app

  ai-service:
    build:
      context: ./backend
      dockerfile: ai-service/Dockerfile
    container_name: ai-service
    env_file:
      - .env
    restart: on-failure
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      django-api-principal:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 5001 --workers 1
    environment:
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB_CONVERSATIONS: ${REDIS_DB_CONTEXT:-2}
      REDIS_DB_CONTEXT: ${REDIS_DB_CONTEXT:-2}
      REDIS_DB_EPHEMERAL: ${REDIS_DB_EPHEMERAL:-6}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    networks:
      - app

  expert-service:
    build:
      context: ./backend
      dockerfile: expert-service/Dockerfile
    container_name: expert-service
    env_file:
      - .env
    restart: on-failure
    command: uvicorn main:app --host 0.0.0.0 --port 5002 --workers 1
    volumes:
      - ./backend/expert-service/rules:/app/rules
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - app

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: on-failure
    mem_limit: 128m
    mem_reservation: 64m
    ports:
      - "8088:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - app

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: on-failure
    mem_limit: 256m
    mem_reservation: 128m
    ports:
      - "8089:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    networks:
      - app

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    restart: on-failure
    mem_limit: 128m
    mem_reservation: 64m
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - app

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    restart: on-failure
    mem_limit: 128m
    mem_reservation: 64m
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "9121:9121"
    networks:
      - app

  rabbitmq-exporter:
    image: kbudde/rabbitmq-exporter:latest
    container_name: rabbitmq-exporter
    restart: on-failure
    mem_limit: 128m
    mem_reservation: 64m
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBIT_URL: http://rabbitmq:15672
      RABBIT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBIT_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
      PUBLISH_PORT: 9419
      OUTPUT_FORMAT: JSON
    ports:
      - "9419:9419"
    networks:
      - app

  mongodb-exporter:
    image: percona/mongodb_exporter:0.40
    container_name: mongodb-exporter
    restart: on-failure
    mem_limit: 128m
    mem_reservation: 64m
    depends_on:
      mongo:
        condition: service_healthy
    command:
      - --mongodb.uri=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongo:27017/admin?authSource=admin
      - --collector.diagnosticdata
      - --collector.replicasetstatus
      - --web.listen-address=:9216
    ports:
      - "9216:9216"
    networks:
      - app

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    restart: on-failure
    mem_limit: 128m
    mem_reservation: 64m
    command:
      - --config.file=/etc/blackbox_exporter/config.yml
    volumes:
      - ./docker/observability/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "9115:9115"
    networks:
      - app

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: on-failure
    mem_limit: 768m
    mem_reservation: 384m
    depends_on:
      cadvisor:
        condition: service_started
      postgres-exporter:
        condition: service_started
      redis-exporter:
        condition: service_started
      rabbitmq-exporter:
        condition: service_started
      mongodb-exporter:
        condition: service_started
      blackbox-exporter:
        condition: service_started
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./docker/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - app

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    restart: on-failure
    mem_limit: 512m
    mem_reservation: 256m
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    networks:
      - app

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: on-failure
    mem_limit: 384m
    mem_reservation: 192m
    depends_on:
      prometheus:
        condition: service_started
      jaeger:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    networks:
      - app

volumes:
  postgres_data:
    driver: local
  mongo_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
    
networks:
  app:
    driver: bridge
