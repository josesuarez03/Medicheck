services:
  django-api-principal:
    build:
      context: ./backend
      dockerfile: django_services/Dockerfile
    container_name: django-api-principal
    env_file:
      - .env
    restart: on-failure
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB_SESSIONS: ${REDIS_DB_SESSIONS:-0}
      REDIS_DB_CACHE: ${REDIS_DB_CACHE:-0}
      REDIS_DB_JWT_BLACKLIST: ${REDIS_DB_JWT_BLACKLIST:-1}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=3).read()"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 5s
    networks:
      - app

  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres
    restart: on-failure
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init/custom_postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./docker/postgres/init/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -h localhost"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 5s
    networks:
      - app

  mongo:
    image: mongo:7
    container_name: mongo
    restart: on-failure
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --username ${MONGO_INITDB_ROOT_USERNAME} --password ${MONGO_INITDB_ROOT_PASSWORD} --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1",
        ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 5s
    networks:
      - app

  redis:
    image: redis:7
    container_name: redis
    restart: on-failure
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 5s
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    restart: unless-stopped
    depends_on:
      django-api-principal:
        condition: service_healthy
      flask-api-chat:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NODE_ENV: development
    stdin_open: true
    tty: true
    networks:
      - app

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    env_file:
      - .env
    restart: on-failure
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping | findstr /C:Pong"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 5s
    networks:
      - app

  celery-worker-chat:
    build:
      context: ./backend
      dockerfile: worker/Dockerfile
    container_name: celery-worker-chat
    env_file:
      - .env
    restart: on-failure
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A celery_app worker -Q ${CHAT_QUEUE:-chat_queue} --concurrency=${CHAT_WORKER_CONCURRENCY:-2} --loglevel=info
    environment:
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB_CONVERSATIONS: ${REDIS_DB_CONTEXT:-2}
      REDIS_DB_CONTEXT: ${REDIS_DB_CONTEXT:-2}
      REDIS_DB_CHAT_BROKER: ${REDIS_DB_CHAT_BROKER:-3}
      REDIS_DB_CELERY_RESULTS: ${REDIS_DB_CELERY_RESULTS:-4}
      REDIS_DB_SOCKET_QUEUE: ${REDIS_DB_SOCKET_QUEUE:-5}
      REDIS_DB_EPHEMERAL: ${REDIS_DB_EPHEMERAL:-6}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://:${REDIS_PASSWORD}@redis:6379/${REDIS_DB_CHAT_BROKER:-3}}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD}@redis:6379/${REDIS_DB_CELERY_RESULTS:-4}}
      CHAT_QUEUE: ${CHAT_QUEUE:-chat_queue}
      ETL_QUEUE: ${ETL_QUEUE:-etl_queue}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:5001}
    networks:
      - app

  celery-worker-etl:
    build:
      context: ./backend
      dockerfile: worker/Dockerfile
    container_name: celery-worker-etl
    env_file:
      - .env
    restart: on-failure
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      django-api-principal:
        condition: service_healthy
    command: celery -A celery_app worker -Q ${ETL_QUEUE:-etl_queue} --concurrency=${ETL_WORKER_CONCURRENCY:-2} --loglevel=info
    environment:
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB_CONVERSATIONS: ${REDIS_DB_CONTEXT:-2}
      REDIS_DB_CONTEXT: ${REDIS_DB_CONTEXT:-2}
      REDIS_DB_CELERY_RESULTS: ${REDIS_DB_CELERY_RESULTS:-4}
      REDIS_DB_SOCKET_QUEUE: ${REDIS_DB_SOCKET_QUEUE:-5}
      REDIS_DB_EPHEMERAL: ${REDIS_DB_EPHEMERAL:-6}
      REDIS_DB_WORKER: ${REDIS_DB_EPHEMERAL:-6}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672//}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD}@redis:6379/${REDIS_DB_CELERY_RESULTS:-4}}
      ETL_QUEUE: ${ETL_QUEUE:-etl_queue}
      CHAT_QUEUE: ${CHAT_QUEUE:-chat_queue}
      ETL_DISPATCH_MODE: ${ETL_DISPATCH_MODE:-celery}
      DJANGO_API_URL: ${DJANGO_API_URL:-http://django-api-principal:8000/api}
      DJANGO_API_URL_FLASK: ${DJANGO_API_URL_FLASK:-http://django-api-principal:8000/api}
      FLASK_API_KEY: ${FLASK_API_KEY}
    networks:
      - app

  flower:
    image: mher/flower:2.0
    container_name: flower
    env_file:
      - .env
    restart: on-failure
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5555:5555"
    command: celery --broker=${CELERY_BROKER_URL:-redis://:${REDIS_PASSWORD}@redis:6379/${REDIS_DB_CHAT_BROKER:-3}} --result-backend=${CELERY_RESULT_BACKEND:-redis://:${REDIS_PASSWORD}@redis:6379/${REDIS_DB_CELERY_RESULTS:-4}} flower --port=5555
    networks:
      - app

