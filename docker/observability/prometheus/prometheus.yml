global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: postgres_exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis_exporter
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: rabbitmq_exporter
    static_configs:
      - targets: ["rabbitmq-exporter:9419"]

  - job_name: mongodb_exporter
    static_configs:
      - targets: ["mongodb-exporter:9216"]

  - job_name: blackbox_http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://frontend:3000
          - http://gateway:5000/health
          - http://ai-service:5001/inference/health
          - http://expert-service:5002/docs
          - http://django-api-principal:8000/health/
          - http://rabbitmq:15672
          - http://flower:5555
          - http://dozzle:8080
          - http://grafana:3000/api/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: blackbox_tcp
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - postgres:5432
          - redis:6379
          - mongo:27017
          - rabbitmq:5672
          - gateway:5000
          - ai-service:5001
          - expert-service:5002
          - django-api-principal:8000
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115
